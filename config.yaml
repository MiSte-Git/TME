# Pipeline-Konfiguration (siehe docs/emoji-odt-kontext.md)
# Pfade
cache_dir: cache/emoji
messages_dir: data/messages
assets_file: data/assets.json
emoji_sets_file: data/emoji_sets.json
runs_original_dir: data/runs.original
plain_dir: data/plain
translated_dir: data/translated
runs_translated_dir: data/runs.translated
out_original_dir: out/original
out_translated_dir: out/translated
report_file: out/report.json

# ODT Stil-IDs (Namen)
odt_styles:
  paragraph:
    base: P.Base
    emoji_line: P.EmojiLine
  text:
    base: T.Base
    bold: T.Bold
    italic: T.Italic
    link: T.Link
  graphic:
    inline_emoji: G.InlineEmoji
  page:
    default: Page.Default

# Standardwerte
emoji_height_em: 1.1
lettermap_case_mode: upper
lettermap_fallback: text
lettermap_in_original: false
lettermap_open_ui_on_missing: true
lettermap_continue_without_mapping: false
debug_dump_entities: true

# Channel-übergreifendes chronologisches Interleaving (Default: aus).
# true = Nachrichten aller Sections/Kanäle werden nach message.date global
# gemischt statt blockweise pro Section ausgegeben; Kanalname erscheint dann
# als Label vor jeder Nachricht. Per UI-Checkbox/Parameter überschreibbar.
interleave_channels: false

# Inkrementelles Dokument-Update (Default: aus). true = Nachrichten werden
# in einem persistenten Message-Store unter data/message_store/<schedule>.json
# gesammelt (inkl. bereits übersetzter Runs, damit nichts doppelt übersetzt/
# bezahlt wird); pro Kanal+Zeitfenster wird nur ab der zuletzt bekannten
# Message-ID neu geholt (Telethon min_id). Das Dokument wird bei jedem Lauf
# komplett aus dem Store neu geschrieben (nicht angehängt) - deshalb ohne
# Zeitstempel im Dateinamen, dieselbe Datei wird fortgeschrieben. Per
# UI-Checkbox/Parameter überschreibbar.
incremental_mode: false

# Dokument-Layout (Default: linear = bisheriges Verhalten unverändert).
# side_by_side = Original und Übersetzung als zweispaltige Tabellenzeile pro
# Nachricht (odf.table), NICHT echtes ODT-Spalten-Layout (fo:column-count) -
# sonst blieben Original/Übersetzung nicht zeilensynchron. translation_mode
# (inline/end/separate) wird bei side_by_side ignoriert, da die Platzierung
# "nebeneinander" bereits durch die Tabellenspalten festgelegt ist. Fehlt eine
# Übersetzung (Provider-Fehler o.ä.), zeigt die Zelle einen Platzhaltertext
# statt leer zu bleiben. Per UI-Auswahl/Parameter überschreibbar.
layout: linear                  # linear | side_by_side

# Telegram-Client (optional)
telegram_client:
  timeout: 20            # Sekunden für RPC-Timeout
  request_retries: 0     # Telethon-interne Request-Retries (wir nutzen eigenen Wrapper)
  auto_reconnect: true   # Verbindungen automatisch wiederherstellen

# Retry-/Backoff-Einstellungen (optional)
retry:
  retries: 5             # Anzahl Versuche pro Operation
  backoff: 1.6           # Exponentieller Backoff-Faktor
  initial_delay: 0.8     # Startwartezeit (Sekunden)
  jitter: 0.3            # Zufallsanteil (Sekunden)

output:
  make_docx: true                # true = nach ODT automatisch DOCX erzeugen
  converter: libreoffice         # libreoffice | pandoc | null (Auto-Auswahl)
  out_dir: null                  # null = gleiche wie ODT, sonst Zielverzeichnis
  pandoc_reference_docx: null    # optional; nur für pandoc (z.B. ./tmpl/reference.docx)

# Übersetzungs-Provider (austauschbar). Default "telegram" = bestehendes
# Verhalten unverändert (Telegrams eigene TranslateTextRequest, kein API-Key
# nötig). deepl/google/chatgpt sind externe Provider mit eigenem API-Key
# (siehe docs/DEPLOY.md) und liefern eine grobe, klar als Schätzung
# gekennzeichnete Kostenanzeige nach jedem Lauf.
translation:
  provider: telegram             # telegram | deepl | google | chatgpt
  deepl:
    api_url: null                 # null = automatisch (Free- vs. Pro-Tier anhand ":fx"-Key-Suffix)
  google:
    {}                            # reserviert für künftige Optionen
  chatgpt:
    model: gpt-4o-mini
  # Grobe Schätzpreise in USD, NICHT live abgefragt (siehe pricing.py -
  # Anbieter-Preise ändern sich häufig, hier bei Bedarf von Hand
  # aktualisieren). Struktur: provider -> modell -> Preise + "checked_on"
  # (Datum der letzten manuellen Prüfung). "default" greift, wenn kein
  # Modell-spezifischer Eintrag existiert (z.B. bei chatgpt.model-Wechsel
  # oben ohne passenden Preis-Eintrag hier).
  pricing:
    telegram:
      default:
        usd_per_million_chars: 0.0
        checked_on: "2026-07-22"
    deepl:
      default:
        usd_per_million_chars: 20.0
        checked_on: "2026-07-22"
    google:
      default:
        usd_per_million_chars: 20.0
        checked_on: "2026-07-22"
    chatgpt:
      # Preise für gpt-4o-mini (siehe chatgpt.model oben) - NICHT für das
      # größere/teurere gpt-4o.
      gpt-4o-mini:
        usd_per_million_input_tokens: 0.15
        usd_per_million_output_tokens: 0.60
        checked_on: "2026-07-22"
      default:
        usd_per_million_input_tokens: 0.15
        usd_per_million_output_tokens: 0.60
        checked_on: "2026-07-22"
    # Noch kein eigener Gemini-Provider implementiert (siehe
    # pipeline/translation/__init__.py::get_provider) - Preistabelle bereits
    # vorbereitet für den Fall, dass ein Gemini-Provider ergänzt wird.
    gemini:
      gemini-2.5-flash-lite:
        usd_per_million_input_tokens: 0.10
        usd_per_million_output_tokens: 0.40
        checked_on: "2026-07-22"
      gemini-2.5-flash:
        usd_per_million_input_tokens: 0.30
        usd_per_million_output_tokens: 2.50
        checked_on: "2026-07-22"
      default:
        usd_per_million_input_tokens: 0.10
        usd_per_million_output_tokens: 0.40
        checked_on: "2026-07-22"
